# 在 push 到 docs 或 main（且变更文档相关路径）时构建 Starlight 并部署到 GitHub Pages。
# 使用前请在仓库 Settings → Pages → Build and deployment 中选择「GitHub Actions」。

name: Deploy documentation

on:
  push:
    branches: [docs, main]
    paths:
      - 'website/**'
      - 'Docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Sync Markdown from Docs/zh and Docs/en
        working-directory: website
        run: npm run sync-docs

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
